<body>

  <div class="container">

    <!-- HEADER -->

    <header>

      <h1>2676</h1>

      <p>EP de danieeel</p>

    </header>

    <!-- PLAYER -->

    <section
      id="audio-player"
      class="audio-player"
    >

      <h3 id="trackTitle">
        Reproductor
      </h3>

      <audio
        id="audio"
        preload="metadata"
      >
        <source
          id="audio-source"
          src=""
          type="audio/mp3"
        />
      </audio>

      <!-- PROGRESS -->

      <div class="progress-volume-container">

        <div class="progress-container">

          <span id="currentTime">
            0:00
          </span>

          <input
            type="range"
            id="progressBar"
            value="0"
            min="0"
            step="1"
          />

          <span id="duration">
            0:00
          </span>

        </div>

        <!-- VOLUME -->

        <div class="volume-container">

          <button
            id="volumeIcon"
            class="material-icons"
          >
            volume_up
          </button>

          <input
            type="range"
            id="volumeControl"
            min="0"
            max="1"
            step="0.01"
            value="1"
          />

        </div>

      </div>

      <!-- CONTROLS -->

      <div class="controls">

        <button
          id="prevBtn"
          class="material-icons"
        >
          skip_previous
        </button>

        <button
          id="playPauseBtn"
          class="material-icons"
        >
          play_arrow
        </button>

        <button
          id="stopBtn"
          class="material-icons"
        >
          stop
        </button>

        <button
          id="nextBtn"
          class="material-icons"
        >
          skip_next
        </button>

        <button
          id="repeatBtn"
          class="material-icons"
        >
          repeat
        </button>

        <button
          id="shuffleBtn"
          class="material-icons"
        >
          shuffle
        </button>

      </div>

    </section>

    <!-- STICKY BLUR -->

    <div class="sticky-blur-divider"></div>
